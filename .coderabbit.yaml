language: "ko-KR"
early_access: false
enable_free_tier: true

reviews:
  profile: "assertive"
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: true
  poem: false
  path_filters:
    - "!target/**"
    - "!docs/learn/**"
  path_instructions:
    - path: "crates/**/*.rs"
      instructions: |
        This is a Rust project using Tokio async runtime and Axum web framework.
        Enforce these rules strictly:
        - No .unwrap() or .expect() in production code (tests/benches/examples are allowed with explicit failure messages)
        - No unsafe without justification comment
        - No println! — use tracing crate (debug!, info!, warn!, error!)
        - No panicking in library code
        - All public functions must have success and error test scenarios
    - path: "crates/common/**"
      instructions: |
        This is the shared types crate (dependency graph leaf).
        It must NOT depend on any other workspace crate.
        Changes to ApiResponse affect all consumers — flag breaking changes.
    - path: "crates/manager/**"
      instructions: |
        This is the HTTP API server binary crate.
        main.rs should only contain bootstrap logic.
        New endpoints need a dedicated handler module + route in app.rs.
    - path: "crates/agent/**"
      instructions: |
        This is the agent binary crate.
        Same rules as manager — main.rs is bootstrap only.
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
  pull_requests:
    scope: "auto"
